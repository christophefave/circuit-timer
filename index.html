<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href='data:application/manifest+json,{"name":"Circuit Timer","short_name":"CircuitTimer","start_url":".","display":"standalone","background_color":"#09090b","theme_color":"#000000","icons":[{"src":"Icone-timer.png","sizes":"192x192","type":"image/png"},{"src":"Icone-timer.png","sizes":"512x512","type":"image/png"}]}'>
    <link rel="apple-touch-icon" href="Icone-timer.png">
    <link rel="icon" type="image/png" href="Icone-timer.png">
    <title>Circuit Training Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: system-ui, -apple-system, sans-serif; }
        
        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Phase Colors */
        .text-prepare { color: #facc15; }
        .text-work { color: #f97316; }
        .text-rest { color: #fb7185; }
        .text-roundRest { color: #60a5fa; }
        .text-idle { color: #f4f4f5; }
        
        .bg-prepare { background-color: rgba(250, 204, 21, 0.1); border-color: rgba(250, 204, 21, 0.2); }
        .bg-work { background-color: rgba(249, 115, 22, 0.1); border-color: rgba(249, 115, 22, 0.2); }
        .bg-rest { background-color: rgba(251, 113, 133, 0.1); border-color: rgba(251, 113, 133, 0.2); }
        .bg-roundRest { background-color: rgba(96, 165, 250, 0.1); border-color: rgba(96, 165, 250, 0.2); }
        .bg-idle { background-color: #27272a; border-color: #3f3f46; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-orange-500/30">
    <!-- Header -->
    <header class="p-4 sm:p-6 border-b border-zinc-800/50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="Icone-timer.png" alt="Logo" class="w-8 h-8 sm:w-10 sm:h-10">
            <h1 class="text-xl sm:text-2xl font-bold tracking-tight">Circuit<span class="text-orange-500">Timer</span></h1>
        </div>
        <div class="relative flex items-center gap-2">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" class="hidden w-24 h-1.5 bg-zinc-700 rounded-lg appearance-none cursor-pointer accent-orange-500">
            <button id="soundToggle" class="p-3 rounded-full hover:bg-zinc-800/50 transition-colors text-zinc-400 hover:text-white">
                <svg id="icon-vol-on" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                <svg id="icon-vol-off" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 w-full max-w-4xl mx-auto gap-6 sm:gap-8">
        
        <!-- Timer Display -->
        <div id="timerCircle" class="w-full max-w-md aspect-square rounded-full flex flex-col items-center justify-center border-4 transition-colors duration-500 relative bg-idle">
            <div id="phaseLabel" class="absolute top-12 sm:top-16 text-xs sm:text-sm font-bold tracking-widest uppercase text-zinc-400">PRÊT</div>
            <div id="timeDisplay" class="text-[110px] sm:text-[160px] leading-none font-black tracking-tighter tabular-nums text-idle transition-colors duration-300">0:10</div>
            
            <div id="progressInfo" class="absolute bottom-12 sm:bottom-16 flex gap-6 sm:gap-8 text-sm font-medium text-zinc-400 hidden">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] sm:text-xs uppercase tracking-wider opacity-60 mb-1">Exo</span>
                    <span class="text-lg sm:text-xl text-white"><span id="currentExo">1</span><span class="text-zinc-500 text-sm sm:text-base">/<span id="totalExo">5</span></span></span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] sm:text-xs uppercase tracking-wider opacity-60 mb-1">Tour</span>
                    <span class="text-lg sm:text-xl text-white"><span id="currentRound">1</span><span class="text-zinc-500 text-sm sm:text-base">/<span id="totalRounds">3</span></span></span>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex gap-3 sm:gap-4">
            <button id="startBtn" class="flex items-center gap-2 bg-orange-500 hover:bg-orange-400 text-zinc-950 px-6 sm:px-8 py-3 sm:py-4 rounded-full font-bold text-base sm:text-lg transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
                DÉMARRER
            </button>
            <button id="pauseBtn" class="hidden flex items-center gap-2 bg-zinc-100 hover:bg-white text-zinc-950 px-6 sm:px-8 py-3 sm:py-4 rounded-full font-bold text-base sm:text-lg transition-all active:scale-95">
                <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                <svg id="icon-resume" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
                <span id="pauseText">PAUSE</span>
            </button>
            <button id="stopBtn" class="hidden flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 text-white w-12 h-12 sm:w-16 sm:h-16 rounded-full transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            </button>
        </div>

        <!-- Configuration Panel -->
        <div id="configPanel" class="w-full max-w-2xl grid grid-cols-3 gap-2 sm:gap-4 mt-2 sm:mt-6">
            <!-- Config items generated by JS -->
        </div>

    </main>

    <script>
        // --- Configuration & State ---
        const config = {
            prepareTime: 10,
            exercises: 5,
            rounds: 3,
            workTime: 30,
            restTime: 10,
            roundRestTime: 60
        };

        let state = {
            status: 'idle', // idle, running, paused, finished
            phase: 'prepare', // prepare, work, rest, roundRest
            timeLeft: config.prepareTime,
            currentExo: 1,
            currentRound: 1,
            volume: 0.5
        };

        let interval = null;
        let audioCtx = null;
        let wakeLock = null;

        // --- Wake Lock API ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.error('Wake Lock error:', err);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().catch(() => {});
                wakeLock = null;
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && state.status === 'running') {
                await requestWakeLock();
            }
        });

        // --- DOM Elements ---
        const timeDisplay = document.getElementById('timeDisplay');
        const phaseLabel = document.getElementById('phaseLabel');
        const timerCircle = document.getElementById('timerCircle');
        const progressInfo = document.getElementById('progressInfo');
        const currentExoEl = document.getElementById('currentExo');
        const totalExoEl = document.getElementById('totalExo');
        const currentRoundEl = document.getElementById('currentRound');
        const totalRoundsEl = document.getElementById('totalRounds');
        
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const pauseText = document.getElementById('pauseText');
        const iconPause = document.getElementById('icon-pause');
        const iconResume = document.getElementById('icon-resume');
        
        const soundToggle = document.getElementById('soundToggle');
        const volumeSlider = document.getElementById('volumeSlider');
        const iconVolOn = document.getElementById('icon-vol-on');
        const iconVolOff = document.getElementById('icon-vol-off');
        const configPanel = document.getElementById('configPanel');

        // --- Audio System ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (state.volume === 0 || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'countdown') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(state.volume, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'work') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, now); // A5
                gain.gain.setValueAtTime(state.volume, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'rest') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now); // A4
                gain.gain.setValueAtTime(state.volume, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'finish') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
                osc.frequency.exponentialRampToValueAtTime(1100, now + 0.4);
                gain.gain.setValueAtTime(state.volume, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.start(now); osc.stop(now + 1);
            }
        }

        // --- UI Updates ---
        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m > 0 ? m + ':' : ''}${s.toString().padStart(m > 0 ? 2 : 1, '0')}`;
        }

        function updateUI() {
            timeDisplay.textContent = formatTime(state.timeLeft);
            currentExoEl.textContent = state.currentExo;
            totalExoEl.textContent = config.exercises;
            currentRoundEl.textContent = state.currentRound;
            totalRoundsEl.textContent = config.rounds;

            // Update Colors
            const colorClass = state.status === 'idle' ? 'idle' : state.phase;
            timerCircle.className = `w-full max-w-md aspect-square rounded-full flex flex-col items-center justify-center border-4 transition-colors duration-500 relative bg-${colorClass}`;
            timeDisplay.className = `text-[110px] sm:text-[160px] leading-none font-black tracking-tighter tabular-nums transition-colors duration-300 text-${colorClass}`;

            // Update Labels
            if (state.status === 'idle') phaseLabel.textContent = 'PRÊT';
            else if (state.status === 'finished') phaseLabel.textContent = 'TERMINÉ';
            else if (state.phase === 'prepare') phaseLabel.textContent = 'PRÉPARATION';
            else if (state.phase === 'work') phaseLabel.textContent = 'TRAVAIL';
            else if (state.phase === 'rest') phaseLabel.textContent = 'REPOS';
            else if (state.phase === 'roundRest') phaseLabel.textContent = 'REPOS LONG';

            // Toggle Visibility
            if (state.status === 'running' || state.status === 'paused') {
                progressInfo.classList.remove('hidden');
                configPanel.classList.add('hidden');
                startBtn.classList.add('hidden');
                pauseBtn.classList.remove('hidden');
                stopBtn.classList.remove('hidden');
                
                if (state.status === 'paused') {
                    pauseText.textContent = 'REPRENDRE';
                    iconPause.classList.add('hidden');
                    iconResume.classList.remove('hidden');
                } else {
                    pauseText.textContent = 'PAUSE';
                    iconPause.classList.remove('hidden');
                    iconResume.classList.add('hidden');
                }
            } else {
                progressInfo.classList.add('hidden');
                configPanel.classList.remove('hidden');
                startBtn.classList.remove('hidden');
                pauseBtn.classList.add('hidden');
                stopBtn.classList.add('hidden');
            }
        }

        // --- Timer Logic ---
        function handleTransition() {
            if (state.phase === 'prepare') {
                state.phase = 'work';
                state.timeLeft = config.workTime;
                playSound('work');
            } else if (state.phase === 'work') {
                if (state.currentExo < config.exercises) {
                    state.phase = 'rest';
                    state.timeLeft = config.restTime;
                    playSound('rest');
                } else if (state.currentRound < config.rounds) {
                    state.phase = 'roundRest';
                    state.timeLeft = config.roundRestTime;
                    playSound('rest');
                } else {
                    state.status = 'finished';
                    state.timeLeft = 0;
                    playSound('finish');
                    clearInterval(interval);
                    releaseWakeLock();
                }
            } else if (state.phase === 'rest') {
                state.currentExo++;
                state.phase = 'work';
                state.timeLeft = config.workTime;
                playSound('work');
            } else if (state.phase === 'roundRest') {
                state.currentRound++;
                state.currentExo = 1;
                state.phase = 'work';
                state.timeLeft = config.workTime;
                playSound('work');
            }
            updateUI();
        }

        function tick() {
            if (state.timeLeft === 4 || state.timeLeft === 3 || state.timeLeft === 2) {
                playSound('countdown');
            }
            if (state.timeLeft <= 1) {
                handleTransition();
            } else {
                state.timeLeft--;
                updateUI();
            }
        }

        // --- Event Listeners ---
        startBtn.addEventListener('click', () => {
            initAudio();
            if (state.status === 'idle' || state.status === 'finished') {
                state.phase = 'prepare';
                state.timeLeft = config.prepareTime;
                state.currentExo = 1;
                state.currentRound = 1;
            }
            state.status = 'running';
            updateUI();
            interval = setInterval(tick, 1000);
            requestWakeLock();
        });

        pauseBtn.addEventListener('click', () => {
            if (state.status === 'running') {
                state.status = 'paused';
                clearInterval(interval);
                releaseWakeLock();
            } else {
                state.status = 'running';
                interval = setInterval(tick, 1000);
                requestWakeLock();
            }
            updateUI();
        });

        stopBtn.addEventListener('click', () => {
            clearInterval(interval);
            state.status = 'idle';
            state.phase = 'prepare';
            state.timeLeft = config.prepareTime;
            updateUI();
            releaseWakeLock();
        });

        soundToggle.addEventListener('click', () => {
            volumeSlider.classList.toggle('hidden');
        });

        volumeSlider.addEventListener('input', (e) => {
            state.volume = parseFloat(e.target.value);
            if (state.volume === 0) {
                iconVolOn.classList.add('hidden');
                iconVolOff.classList.remove('hidden');
                soundToggle.classList.replace('text-zinc-400', 'text-zinc-600');
            } else {
                iconVolOn.classList.remove('hidden');
                iconVolOff.classList.add('hidden');
                soundToggle.classList.replace('text-zinc-600', 'text-zinc-400');
            }
        });

        // --- Generate Config UI ---
        const configItems = [
            { key: 'prepareTime', label: 'Prépa (s)' },
            { key: 'exercises', label: 'Exercices' },
            { key: 'rounds', label: 'Tours' },
            { key: 'workTime', label: 'Travail (s)' },
            { key: 'restTime', label: 'Repos (s)' },
            { key: 'roundRestTime', label: 'Repos T. (s)' }
        ];

        configItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'bg-zinc-900/50 border border-zinc-800 rounded-2xl p-2 sm:p-4 flex flex-col items-center gap-2 sm:gap-3';
            div.innerHTML = `
                <div class="text-zinc-400 text-[10px] sm:text-xs font-bold uppercase tracking-wider text-center truncate w-full">${item.label}</div>
                <div class="flex items-center gap-1 sm:gap-4">
                    <button class="dec w-8 h-8 sm:w-11 sm:h-11 rounded-full bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-zinc-300 transition-colors active:scale-95 shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <input type="number" inputmode="numeric" class="val text-base sm:text-2xl font-bold tabular-nums w-8 sm:w-14 text-center bg-transparent border-none outline-none focus:ring-2 focus:ring-orange-500/50 rounded appearance-none m-0 p-0" value="${config[item.key]}">
                    <button class="inc w-8 h-8 sm:w-11 sm:h-11 rounded-full bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-zinc-300 transition-colors active:scale-95 shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    </button>
                </div>
            `;
            
            const input = div.querySelector('.val');
            
            const updateValue = (newVal) => {
                newVal = Math.max(1, parseInt(newVal, 10) || 1);
                config[item.key] = newVal;
                input.value = newVal;
                if (state.status === 'idle' && item.key === 'prepareTime') {
                    state.timeLeft = config.prepareTime;
                    updateUI();
                }
            };

            div.querySelector('.dec').addEventListener('click', () => updateValue(config[item.key] - 1));
            div.querySelector('.inc').addEventListener('click', () => updateValue(config[item.key] + 1));
            
            input.addEventListener('focus', (e) => e.target.select());
            input.addEventListener('click', (e) => e.target.select());
            input.addEventListener('blur', (e) => updateValue(e.target.value));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') input.blur();
            });

            configPanel.appendChild(div);
        });

        // Initial render
        updateUI();
    </script>
</body>
</html>
